version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: hawaii-tvr-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: hawaii-tvr-dashboard
    volumes:
      - mongodb_data:/data/db
      - ./scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
      - ./scripts/seed-data.js:/docker-entrypoint-initdb.d/seed-data.js:ro
    networks:
      - hawaii-tvr-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache (shared with dashboard and temporal)
  redis:
    image: redis:7-alpine
    container_name: hawaii-tvr-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass redis123
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - hawaii-tvr-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL for Temporal
  postgres:
    image: postgres:13
    container_name: hawaii-tvr-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hawaii-tvr-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Temporal Server
  temporal:
    image: temporalio/auto-setup:latest
    container_name: hawaii-tvr-temporal
    restart: unless-stopped
    ports:
      - "7233:7233"  # gRPC
      - "8233:8233"  # HTTP
    environment:
      - DB=postgres12
      - DB_USER=postgres
      - DB_PASSWORD=temporal
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=temporal
      - DEFAULT_NAMESPACE=default
      - POSTGRES_SEEDS=postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hawaii-tvr-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8233"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Temporal UI
  temporal-ui:
    image: temporalio/ui:latest
    container_name: hawaii-tvr-temporal-ui
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_UI_PORT=8088
    depends_on:
      temporal:
        condition: service_healthy
    networks:
      - hawaii-tvr-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Temporal Worker (temporarily disabled for faster startup)
  # temporal-worker:
  #   build:
  #     context: ./hawaii-vrbo-airbnb-crawler-api
  #     dockerfile: Dockerfile.worker
  #   container_name: hawaii-tvr-temporal-worker
  #   restart: unless-stopped
  #   environment:
  #     - TEMPORAL_ADDRESS=temporal:7233
  #     - TEMPORAL_NAMESPACE=default
  #     - NODE_ENV=development
  #     - MONGODB_URI=mongodb://admin:password123@mongodb:27017/hawaii-tvr-crawler?authSource=admin
  #     - REDIS_URL=redis://:redis123@redis:6379
  #   depends_on:
  #     - temporal
  #     - postgres
  #     - mongodb
  #     - redis
  #   networks:
  #     - hawaii-tvr-network
  #   volumes:
  #     - ./hawaii-vrbo-airbnb-crawler-api/src:/app/src
  #     - ./hawaii-vrbo-airbnb-crawler-api/package.json:/app/package.json
  #   command: npm run worker:dev

  # Azure Blob Storage Emulator
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.24.0
    container_name: hawaii-tvr-azurite
    restart: unless-stopped
    ports:
      - "10000:10000"  # Blob service
      - "10001:10001"  # Queue service
      - "10002:10002"  # Table service
    environment:
      AZURITE_ACCOUNTS: hawaiitvrdev:hawaiitvrkey123
    volumes:
      - azurite_data:/data
    networks:
      - hawaii-tvr-network

  # Dashboard Backend API
  dashboard-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend.dev
    container_name: hawaii-tvr-dashboard-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/hawaii-tvr-dashboard?authSource=admin
      REDIS_URL: redis://:redis123@redis:6379
      JWT_SECRET: dev-jwt-secret-key
      CRAWLER_API_URL: http://crawler-api:3000
      CRAWLER_API_KEY: dev-crawler-api-key
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      AZURE_STORAGE_CONNECTION_STRING: DefaultEndpointsProtocol=http;AccountName=hawaiitvrdev;AccountKey=hawaiitvrkey123;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;
      AZURE_STORAGE_CONTAINER_NAME: dashboard-evidence
      LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hawaii-tvr-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Crawler API (Apify-backed VRBO/Airbnb crawler)
  crawler-api:
    build:
      context: ./hawaii-vrbo-airbnb-crawler-api
      dockerfile: Dockerfile.dev
    container_name: hawaii-tvr-crawler-api
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      # Reuse shared MongoDB and Redis from main stack
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/hawaii-vr-crawler?authSource=admin
      REDIS_URL: redis://:redis123@redis:6379
      POSTGRES_URI: postgresql://postgres:temporal@postgres:5432/temporal
      # Apify / auth can be wired for real later
      APIFY_TOKEN: dev-apify-token
      JWT_SECRET: dev-crawler-jwt-secret
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hawaii-tvr-network

  # Dashboard Frontend
  dashboard-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.dev
    container_name: hawaii-tvr-dashboard-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: development
      REACT_APP_API_BASE_URL: http://localhost:3001
      REACT_APP_CRAWLER_API_URL: http://localhost:3002
      REACT_APP_CRAWLER_API_KEY: dev-crawler-api-key
      REACT_APP_TEMPORAL_ENABLED: true
      REACT_APP_TEMPORAL_UI_URL: http://localhost:8088
      CHOKIDAR_USEPOLLING: true
      GENERATE_SOURCEMAP: true
      HOST: 0.0.0.0
      PORT: 5173
    depends_on:
      - dashboard-backend
    networks:
      - hawaii-tvr-network
    volumes:
      - .:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: hawaii-tvr-nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - dashboard-frontend
      - dashboard-backend
    networks:
      - hawaii-tvr-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Development Tools
  dev-tools:
    image: adminer:latest
    container_name: hawaii-tvr-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mongodb
    depends_on:
      - mongodb
    networks:
      - hawaii-tvr-network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: hawaii-tvr-redis-commander
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      REDIS_HOSTS: local:redis:6379:0:redis123
    depends_on:
      - redis
    networks:
      - hawaii-tvr-network

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  azurite_data:
    driver: local
  postgres_data:
    driver: local

networks:
  hawaii-tvr-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
