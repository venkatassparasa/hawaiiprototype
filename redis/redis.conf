# Redis configuration for Hawaii TVR Dashboard development

# Network settings
bind 0.0.0.0
port 6379
protected-mode yes

# Authentication
requirepass redis123

# General settings
daemonize no
pidfile /var/run/redis/redis-server.pid
loglevel notice
logfile ""

# Database settings
databases 16

# Persistence settings
save 900 1
save 300 10
save 60 10000

stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# AOF persistence
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Memory management
maxmemory 512mb
maxmemory-policy allkeys-lru

# Slow log settings
slowlog-log-slower-than 10000
slowlog-max-len 128

# Client settings
timeout 300
tcp-keepalive 300
tcp-backlog 511

# Security settings
# Note: In production, use stronger passwords and additional security measures

# Performance settings
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
hll-sparse-max-bytes 3000

# Active rehashing
activerehashing yes

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Client query buffer limits
client-query-buffer-limit 1gb

# Protocol max bulk request size
proto-max-bulk-len 512mb

# Frequency of rehashing
hz 10

# AOF rewrite incremental fsync
aof-rewrite-incremental-fsync yes

# RDB save incremental fsync
rdb-save-incremental-fsync yes

# Disable protected mode for Docker environment
# (already handled by binding to 0.0.0.0 and requiring password)
