<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="600" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#1e293b">
    Azure Kubernetes Service (AKS) - Compliance Dashboard Deployment
  </text>
  
  <!-- AKS Cluster -->
  <g id="aks-cluster">
    <!-- Cluster Container -->
    <rect x="100" y="100" width="1000" height="600" rx="20" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <text x="600" y="130" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#1e293b">
      AKS Cluster (compliance-dashboard-aks)
    </text>
    
    <!-- Subnet -->
    <rect x="130" y="160" width="940" height="520" rx="15" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="5,5"/>
    <text x="600" y="185" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#0ea5e9">
      Subnet: 10.0.0.0/16
    </text>
    
    <!-- Node Pool -->
    <g id="node-pool">
      <rect x="160" y="220" width="880" height="120" rx="10" fill="#e8f5e8" stroke="#92400e" stroke-width="1"/>
      <text x="600" y="245" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#92400e">
        Node Pool (3 nodes)
      </text>
      
      <!-- Nodes -->
      <g id="nodes">
        <!-- Node 1 -->
        <rect x="180" y="360" width="240" height="280" rx="8" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
        <text x="300" y="385" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#6b7280">
          Node 1 (Standard_D4s_v3)
        </text>
        
        <!-- Node 1 Pods -->
        <rect x="190" y="420" width="220" height="200" rx="5" fill="#f3f4f6" stroke="#9333ea" stroke-width="1"/>
        <text x="300" y="440" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ffffff">
          Frontend Pod
        </text>
        <rect x="200" y="460" width="80" height="30" rx="3" fill="#10b981" stroke="#059669" stroke-width="1"/>
        <text x="240" y="480" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#ffffff">
          compliance-dashboard-frontend
        </text>
        
        <rect x="290" y="460" width="100" height="30" rx="3" fill="#3b82f6" stroke="#2563eb" stroke-width="1"/>
        <text x="340" y="480" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#ffffff">
          nginx-ingress
        </text>
        
        <!-- Node 2 -->
        <rect x="460" y="360" width="240" height="280" rx="8" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
        <text x="580" y="385" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#6b7280">
          Node 2 (Standard_D4s_v3)
        </text>
        
        <!-- Node 2 Pods -->
        <rect x="470" y="420" width="220" height="200" rx="5" fill="#f3f4f6" stroke="#9333ea" stroke-width="1"/>
        <text x="580" y="440" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ffffff">
          Backend Pod
        </text>
        <rect x="480" y="460" width="80" height="30" rx="3" fill="#10b981" stroke="#059669" stroke-width="1"/>
        <text x="520" y="480" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#ffffff">
          compliance-dashboard-backend
        </text>
        
        <rect x="570" y="460" width="100" height="30" rx="3" fill="#3b82f6" stroke="#2563eb" stroke-width="1"/>
        <text x="620" y="480" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#ffffff">
          temporal-worker
        </text>
        
        <!-- Node 3 -->
        <rect x="740" y="360" width="240" height="280" rx="8" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
        <text x="860" y="385" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#6b7280">
          Node 3 (Standard_D4s_v3)
        </text>
        
        <!-- Node 3 Pods -->
        <rect x="750" y="420" width="220" height="200" rx="5" fill="#f3f4f6" stroke="#9333ea" stroke-width="1"/>
        <text x="860" y="440" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ffffff">
          Database Pod
        </text>
        <rect x="760" y="460" width="80" height="30" rx="3" fill="#10b981" stroke="#059669" stroke-width="1"/>
        <text x="800" y="480" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#ffffff">
          postgresql-db
        </text>
        
        <rect x="850" y="460" width="100" height="30" rx="3" fill="#3b82f6" stroke="#2563eb" stroke-width="1"/>
        <text x="900" y="480" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#ffffff">
          redis-cache
        </text>
      </g>
    </g>
  </g>
  
  <!-- Azure Services -->
  <g id="azure-services">
    <!-- Application Gateway -->
    <rect x="50" y="80" width="120" height="40" rx="5" fill="#0078d4" stroke="#005a9e" stroke-width="2"/>
    <text x="110" y="105" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">
      Application Gateway
    </text>
    <line x1="170" y1="100" x2="190" y2="100" stroke="#0078d4" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Load Balancer -->
    <rect x="50" y="140" width="120" height="40" rx="5" fill="#0078d4" stroke="#005a9e" stroke-width="2"/>
    <text x="110" y="165" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">
      Load Balancer
    </text>
    <line x1="170" y1="160" x2="470" y2="160" stroke="#0078d4" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Container Registry -->
    <rect x="50" y="200" width="120" height="40" rx="5" fill="#0078d4" stroke="#005a9e" stroke-width="2"/>
    <text x="110" y="225" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">
      Container Registry
    </text>
    <line x1="170" y1="220" x2="750" y2="220" stroke="#0078d4" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Azure Database -->
    <g id="azure-db">
      <rect x="50" y="260" width="120" height="60" rx="5" fill="#0078d4" stroke="#005a9e" stroke-width="2"/>
      <text x="110" y="285" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">
        Azure Database
      </text>
      <text x="110" y="300" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#ffffff">
        PostgreSQL Flexible Server
      </text>
      <line x1="170" y1="290" x2="760" y2="475" stroke="#0078d4" stroke-width="2" marker-end="url(#arrowhead)"/>
    </g>
    
    <!-- Key Vault -->
    <rect x="50" y="340" width="120" height="40" rx="5" fill="#0078d4" stroke="#005a9e" stroke-width="2"/>
    <text x="110" y="365" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">
      Key Vault
    </text>
    <line x1="170" y1="360" x2="850" y2="475" stroke="#0078d4" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- External Services -->
  <g id="external-services">
    <!-- Temporal Service -->
    <rect x="1050" y="200" width="120" height="60" rx="5" fill="#ff6b35" stroke="#ea580c" stroke-width="2"/>
    <text x="1110" y="225" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">
      Temporal Service
    </text>
    <text x="1110" y="245" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#ffffff">
      (External)
    </text>
    <line x1="1050" y1="230" x2="620" y2="475" stroke="#ff6b35" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
    
    <!-- Render Service -->
    <rect x="1050" y="280" width="120" height="60" rx="5" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <text x="1110" y="305" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">
      Render/Vercel
    </text>
    <text x="1110" y="325" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#ffffff">
      (Production)
    </text>
    <line x1="1050" y1="310" x2="340" y2="475" stroke="#10b981" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Network Traffic -->
  <g id="network-traffic">
    <!-- Ingress Traffic -->
    <path d="M 340 475 L 170 160" stroke="#0078d4" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="255" y="310" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#0078d4">
      HTTPS (443)
    </text>
    
    <!-- Database Connection -->
    <path d="M 760 475 L 170 290" stroke="#0078d4" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="465" y="380" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#0078d4">
      PostgreSQL (5432)
    </text>
    
    <!-- Temporal Connection -->
    <path d="M 620 475 L 1050 230" stroke="#ff6b35" stroke-width="2" fill="none" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
    <text x="835" y="350" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#ff6b35">
      Temporal (7233)
    </text>
    
    <!-- Render Connection -->
    <path d="M 340 475 L 1050 310" stroke="#10b981" stroke-width="2" fill="none" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
    <text x="695" y="390" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#10b981">
      HTTPS (443)
    </text>
  </g>
  
  <!-- Legend -->
  <g id="legend">
    <rect x="50" y="720" width="1100" height="60" rx="5" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="600" y="740" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e293b">
      Legend
    </text>
    
    <!-- Legend Items -->
    <rect x="70" y="755" width="15" height="15" rx="2" fill="#ffffff" stroke="#6b7280" stroke-width="1"/>
    <text x="90" y="767" font-family="Arial, sans-serif" font-size="12" text-anchor="start" fill="#1e293b">
      AKS Node
    </text>
    
    <rect x="200" y="755" width="15" height="15" rx="2" fill="#f3f4f6" stroke="#9333ea" stroke-width="1"/>
    <text x="220" y="767" font-family="Arial, sans-serif" font-size="12" text-anchor="start" fill="#1e293b">
      Pod
    </text>
    
    <rect x="330" y="755" width="15" height="15" rx="2" fill="#0078d4" stroke="#005a9e" stroke-width="1"/>
    <text x="350" y="767" font-family="Arial, sans-serif" font-size="12" text-anchor="start" fill="#1e293b">
      Azure Service
    </text>
    
    <rect x="460" y="755" width="15" height="15" rx="2" fill="#ff6b35" stroke="#ea580c" stroke-width="1"/>
    <text x="480" y="767" font-family="Arial, sans-serif" font-size="12" text-anchor="start" fill="#1e293b">
      External Service
    </text>
    
    <rect x="590" y="755" width="15" height="15" rx="2" fill="#10b981" stroke="#059669" stroke-width="1"/>
    <text x="610" y="767" font-family="Arial, sans-serif" font-size="12" text-anchor="start" fill="#1e293b">
      CDN/Hosting
    </text>
  </g>
  
  <!-- Arrow Marker Definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
  </defs>
</svg>
