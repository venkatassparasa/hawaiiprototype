# Redis configuration for development
# Save a snapshot if at least 1 key changed within 300 seconds (5 minutes)
save 300 1

# Save a snapshot if at least 10 keys changed within 60 seconds
save 60 10

# Save a snapshot if at least 10000 keys changed within 1 second
save 1 10000

# Enable AOF (Append Only File) persistence
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Set memory limit (default is 256MB for development)
maxmemory 256mb
maxmemory-policy allkeys-lru

# Enable logging
loglevel notice
logfile ""

# Number of databases
databases 16

# Network configuration
bind 0.0.0.0
port 6379
timeout 300

# Slow log configuration
slowlog-log-slower-than 10000
slowlog-max-len 128

# Client configuration
tcp-keepalive 300
tcp-backlog 511

# Security (for development - no password)
# requirepass yourpassword

# Memory optimization
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# Pub/Sub
notify-keyspace-events ""

# Other settings
databases 16
always-show-logo yes
