version: '3.8'

services:
  # MongoDB Database for Local Development
  mongodb:
    image: mongo:7.0
    container_name: hawaii-vr-crawler-mongodb-dev
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: hawaii-vr-crawler
    ports:
      - "27017:27017"
    volumes:
      - mongodb_dev_data:/data/db
      - ./scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
      - ./scripts/seed-data.js:/docker-entrypoint-initdb.d/seed-data.js:ro
    networks:
      - hawaii-vr-dev-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis for caching and job queues (Development)
  redis:
    image: redis:7.2-alpine
    container_name: hawaii-vr-crawler-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - hawaii-vr-dev-network
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # MongoDB Express (Optional - for database management)
  mongo-express:
    image: mongo-express:latest
    container_name: hawaii-vr-crawler-mongo-express-dev
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password123
      ME_CONFIG_MONGODB_URL: mongodb://admin:password123@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    networks:
      - hawaii-vr-dev-network
    profiles:
      - tools

  # Redis Commander (Optional - for Redis management)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: hawaii-vr-crawler-redis-commander-dev
    restart: unless-stopped
    depends_on:
      - redis
    ports:
      - "8082:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
      HTTP_USER: admin
      HTTP_PASSWORD: admin123
    networks:
      - hawaii-vr-dev-network
    profiles:
      - tools

  # API Service (Development)
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: hawaii-vr-crawler-api-dev
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/hawaii-vr-crawler?authSource=admin
      REDIS_URL: redis://redis:6379
      APIFY_TOKEN: ${APIFY_TOKEN}
      APIFY_USER_ID: ${APIFY_USER_ID}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: us-west-1
      AWS_S3_BUCKET: hawaii-vr-evidence-dev
      JWT_SECRET: dev-jwt-secret-key-change-in-production
      LOG_LEVEL: debug
      ENABLE_SWAGGER: true
      ENABLE_CORS: true
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - /app/node_modules
    networks:
      - hawaii-vr-dev-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Development Tools
  dev-tools:
    image: node:18-alpine
    container_name: hawaii-vr-crawler-dev-tools
    restart: "no"
    depends_on:
      - mongodb
      - redis
    environment:
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/hawaii-vr-crawler?authSource=admin
      REDIS_URL: redis://redis:6379
    volumes:
      - ./scripts:/app/scripts
      - ./tests:/app/tests
    networks:
      - hawaii-vr-dev-network
    profiles:
      - tools
    command: sleep infinity

volumes:
  mongodb_dev_data:
    driver: local
  redis_dev_data:
    driver: local

networks:
  hawaii-vr-dev-network:
    driver: bridge
